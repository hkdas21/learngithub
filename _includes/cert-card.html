<a href="{{ include.cert.path | relative_url }}" class="cert-card" style="border-top: 4px solid {{ include.cert.color }}">
  <div class="cert-card-code" style="color: {{ include.cert.color }}">{{ include.cert.code }}</div>
  <h3 class="cert-card-title">{{ include.cert.title }}</h3>
  <p class="cert-card-desc">{{ include.cert.description }}</p>
  <span class="cert-card-link">Start Studying →</span>
</a>
