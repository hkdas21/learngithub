# GitHub Certifications Study Guide
# Site settings
title: GitHub Certifications Study Guide
description: Comprehensive study materials for all five GitHub certification exams
baseurl: "/github-cert-study-guide"  # Change to your repo name
url: ""  # Your GitHub Pages URL, e.g., https://username.github.io

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Collections (optional, for future expansion)
collections_dir: .

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "gh-*"
    values:
      layout: "certification"
